<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{Admin/Adminbase::layout(~{::main})}">
<body>
    <main class="container">
        <div class="card shadow">
            <div class="card-header py-3 bg-primary text-white text-center">
                <h4>Manage Students</h4>
            </div>
            <div class="card-body">
                <!-- <div class="text-end mb-3">
                    <a href="#" class="btn btn-success btn-sm">
                        <i class="bi bi-person-plus-fill"></i> Add New Student
                    </a>
                </div>-->
                
                <div class="table-responsive">
                    <table id="myTable" class="table table-bordered table-hover mt-2">
                        <thead class="table-secondary">
                            <tr>
                                <th>Sr. No.</th>
                                <th>Profile Pic</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Contact No</th>
                                <th>Course</th>
                                <th>Branch</th>
                                <th>Year</th>
                                <th>DOB</th>
                                <th>Aadhar No</th>
                                <th>Reg. Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="student, srno : ${studentList}">
                                <td class="text-center" th:text="${srno.index + 1}"></td>
                                <td>
                                    <img th:src="${student.profilepic != null ? '/ProfilePic/' + student.profilepic : '/images/user_img.jpg'}" class="rounded-circle" style="width: 50px; height: 50px; object-fit: cover;">
                                </td>
                                <td th:text="${student.name}"></td>
                                <td th:text="${student.email}"></td>
                                <td th:text="${student.contactno}"></td>
                                <td th:text="${student.course}"></td>
                                <td th:text="${student.branch}"></td>
                                <td th:text="${student.year}"></td>
                                <td th:text="${student.dob}"></td>
                                <td th:text="${student.aadharno}"></td>
                                <td th:text="${#temporals.format(student.regdate, 'dd-MM-yyyy HH:mm')}"></td>
                               <td class="text-center">
    								<a th:href="@{UpdateStatus(id=${student.id})}" th:text="${student.status}"
       									class="btn btn-sm"
       									th:classappend="(${student.status.name()} == 'PENDING' ? 'btn-warning' : 
                 						(${student.status.name()} == 'VERIFIED' ? 'btn-success' : 
                 						(${student.status.name()} == 'DISABLED' ? 'btn-danger' : 'btn-secondary')))">
    								</a>
								</td>
                               
                                <td class="text-center">
                                    <a th:href="@{EditStudent(id=${student.id})}" class="btn btn-warning btn-sm me-2">
                                        <i class="bi bi-pencil-square"></i> Edit
                                    </a>
                                    <a th:href="@{DeleteStudent(id=${student.id})}" class="btn btn-danger btn-sm"
                                       onclick="return confirm('Are you sure you want to delete this student?');">
                                        <i class="bi bi-trash"></i> Delete
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <style>
            th, td {
                white-space: nowrap;
            }
        </style>
    </main>
</body>
</html>
