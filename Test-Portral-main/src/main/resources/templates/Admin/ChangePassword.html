<html th:replace="~{Admin/adminbase::layout(~{::main})}">
    <body>
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-7 col-lg-6">
                        <div class="card shadow-lg border-0 rounded-2 p-4">
                            <h4 class="text-center text-primary mb-4">
                                <i class="bi bi-shield-lock-fill"></i> Change Password
                            </h4>
                            
                            <form th:action="@{ChangePassword}" method="post">
                                
                                <!-- Current Password -->
                                <div class="mb-3">
                                    <label for="currentPassword" class="form-label">
                                        <i class="bi bi-lock-fill text-primary"></i> Current Password
                                    </label>
                                    <input type="password" class="form-control" id="currentPassword" name="currentPassword" placeholder="Enter current password" required>
                                </div>
                                
                                <!-- New Password -->
                                <div class="mb-3">
                                    <label for="newPassword" class="form-label">
                                        <i class="bi bi-lock text-primary"></i> New Password
                                    </label>
                                    <input type="password" class="form-control" id="newPassword" name="newPassword" placeholder="Enter new password" required>
                                </div>
                                
                                <!-- Confirm Password -->
                                <div class="mb-4">
                                    <label for="confirmPassword" class="form-label">
                                        <i class="bi bi-lock-check text-primary"></i> Confirm New Password
                                    </label>
                                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Re-enter new password" required>
                                </div>
                                
                                <!-- Submit Button -->
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-arrow-repeat"></i> Update Password
                                    </button>
                                </div>
                            </form>
                            
                            <!-- Alert messages -->
                            <div class="mt-3" th:if="${errorMessage}">
                                <div class="alert alert-danger" th:text="${errorMessage}"></div>
                            </div>
                 
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
