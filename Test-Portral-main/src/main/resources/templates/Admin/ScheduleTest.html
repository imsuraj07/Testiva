<html th:replace="~{Admin/Adminbase::layout(~{::main})}">
<body>
    <main class="container">
        <div class="card shadow-lg w-75 mx-auto">
            <div class="card-header bg-primary text-white">
                <h4>Schedule New Test</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/Admin/ScheduleTest}" th:object="${testInfo}" method="post">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="testname" class="form-label">Test Name:</label>
                            <input type="text" id="testname" th:field="*{testName}" class="form-control" placeholder="Enter Test Name" required>
                        </div>
                        <div class="col-md-6">
                            <label for="course" class="form-label">Course:</label>
                            <select id="course" th:field="*{course}" class="form-control" required>
                                <option value="">--Select Course--</option>
                                <option value="B.Tech">B.Tech</option>
                       			<option value="M.Tech">M.Tech</option>
                        		<option value="BCA">BCA</option>
                        		<option value="MCA">MCA</option>   
                        		<option value="Diploma">Diploma</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="branch" class="form-label">Branch:</label>
                            <select id="branch" th:field="*{branch}" class="form-control" required>
                                <option value="">--Select Branch--</option>
                                <option value="Computer Science">Computer Science</option>
                        		<option value="Electrical">Electrical</option>
                        		<option value="Electronics">Electronics</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="year" class="form-label">Year:</label>
                            <select id="year" th:field="*{year}" class="form-control" required>
                                <option value="">--Select Year--</option>
                                <option value="First Year">First Year</option>
                        		<option value="Second Year">Second Year</option>
                        		<option value="Third Year">Third Year</option>
                        		<option value="Fourth Year">Fourth Year</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="numberOfQuestions" class="form-label">Number of Questions:</label>
                            <input type="number" id="numberOfQuestions" th:field="*{numberOfQuestions}" class="form-control" placeholder="Enter Total Questions" required>
                        </div>
                        <div class="col-md-6">
                            <label for="testDuration" class="form-label">Test Duration (Minutes):</label>
                            <input type="number" id="testDuration" th:field="*{testDuration}" class="form-control" placeholder="Duration in minutes (e.g. 30, 60)" min="1" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="startTime" class="form-label">Start Time:</label>
                        <input type="datetime-local" id="startTime" th:field="*{startTime}" class="form-control" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Schedule Test</button>
                    </div>
                </form>
            </div>
        </div>
        
        
        	<div class="card shadow">
            <div class="card-header py-3 bg-primary text-white text-center">
                <h4>Manage All Tests</h4>
            </div>
            <div class="card-body">
                
                <div class="table-responsive">
                    <table id="myTable" class="table table-bordered table-hover mt-2">
                        <thead class="table-secondary">
                            <tr>
                                <th>Sr. No.</th>
                                <th>Test Name</th>
                                <th>Test Id</th>
                                <th>Course</th>
                                <th>Branch</th>
                                <th>Year</th>
                                <th>Total Question</th>
                                <th>Duration</th>
                                <th>Start Time</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="test, srno : ${testList}">
                                <td class="text-center" th:text="${srno.index + 1}"></td>
                                <td th:text="${test.testName}"></td>
                                <td th:text="${test.testId}"></td>
                                <td th:text="${test.course}"></td>
                                <td th:text="${test.branch}"></td>
                                <td th:text="${test.year}"></td>
                                
                                <td th:text="${test.numberOfQuestions + ' Questions'}"></td>
                                <td th:text="${test.testDuration +' Minutes'}"></td>
                                <td th:text="${#temporals.format(test.startTime, 'dd-MM-yyyy HH:mm')}"></td>
                                
                               <td class="text-center">
    								<span th:text="${test.status}"
       									class="btn btn-sm"
       									th:classappend="(${test.status.name()} == 'Scheduled' ? 'btn-info' : 
                 						(${test.status.name()} == 'Active' ? 'btn-success' : 
                 						(${test.status.name()} == 'Reminder_Sent' ? 'btn-warning' : 'btn-secondary')))">
    								</span>
								</td>
                               
                                <td class="text-center">
                                    <a th:href="@{EditTest(id=${test.id})}" class="btn btn-success btn-sm me-2">
                                        <i class="bi bi-pencil-square"></i> Edit
                                    </a>
                                    <a th:href="@{DeleteTest(id=${test.id})}" class="btn btn-danger btn-sm"
                                       onclick="return confirm('Are you sure you want to delete this Test?');">
                                        <i class="bi bi-trash"></i> Delete
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <style>
            th, td {
                white-space: nowrap;
            }
        </style>
        	
        
        <input type="hidden" id="msg" th:if="${msg}" th:value="${msg}">
        <script type="text/javascript">
        	var msg = document.getElementById("msg");
        	if(msg.value!="")
        	{
        		alert(msg.value);	
        	}
        </script>
    </main>
</body>
</html>
