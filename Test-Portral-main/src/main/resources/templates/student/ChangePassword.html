<!DOCTYPE html>
<html th:replace="~{Student/studentbase::layout(~{::main})}">

<body>
<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white text-center">
                    <h5>Change Password</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        
                        <div class="mb-3">
                            <label class="form-label">Current Password</label>
                            <input type="password" name="currentPassword" class="form-control" placeholder="Current Password..."  required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" name="newPassword" class="form-control" placeholder="New Password..." required minlength="6">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" name="confirmPassword" class="form-control" placeholder="Confirm Password..." required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Update Password</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Optional success or error message -->
            <div th:if="${msg}" class="alert alert-info mt-3 text-center" th:text="${msg}"></div>
            
        </div>
    </div>
</main>
</body>
</html>
