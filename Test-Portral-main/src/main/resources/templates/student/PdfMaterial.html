<html th:replace="~{Student/studentbase::layout(~{::main})}">
  <body>
    <main>
      <div class="container">
        <h2 class="text-primary mb-4">
          <i class="bi bi-file-earmark-pdf-fill"></i> PDF Study Materials
        </h2>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
          <!-- Repeat this card 15 times with dummy data -->
          <!-- PDF Card 1 -->
          <div class="col" th:each="i : ${#numbers.sequence(1,15)}">
            <div class="card shadow-sm border-0 h-100">
              <div class="card-body d-flex flex-column justify-content-between">
                <div>
                  <h5 class="card-title text-primary">
                    <i class="bi bi-file-earmark-pdf-fill me-2"></i> PDF Material #[[${i}]]
                  </h5>
                  <p class="text-muted mb-3">Uploaded by Admin on 01 July 2025</p>
                </div>
                <div class="d-flex justify-content-between">
                  <a href="#" class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-eye"></i> View
                  </a>
                  <a href="#" class="btn btn-sm btn-primary">
                    <i class="bi bi-download"></i> Download
                  </a>
                </div>
              </div>
            </div>
          </div>
          <!-- End of loop -->
        </div>
      </div>
    </main>
  </body>
</html>
