<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{Student/studentbase::layout(~{::main})}">
<body>
    <main class="container mt-4 mb-5">

        <h2 class="text-center fw-bold mb-1">
            <i class="bi bi-bar-chart-line-fill me-2 text-primary"></i>My Test Results
        </h2>
        <p class="text-center text-muted mb-4">A complete history of all your completed exams</p>

        <!-- ── EMPTY STATE ── -->
        <div th:if="${testResults.isEmpty()}" class="d-flex justify-content-center mt-5">
            <div class="card text-center shadow border-0" style="max-width:480px;">
                <div class="card-body py-5">
                    <i class="bi bi-clipboard2-x-fill text-secondary" style="font-size:4rem;"></i>
                    <h5 class="card-title mt-3 text-muted">No Results Yet</h5>
                    <p class="card-text text-secondary">
                        You haven't taken any tests. Once you complete an exam, your results will appear here.
                    </p>
                    <a href="GiveTest" class="btn btn-primary mt-2 px-4">
                        <i class="bi bi-play-circle me-1"></i>Give a Test
                    </a>
                </div>
            </div>
        </div>

        <!-- ── RESULT CARDS GRID ── -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" th:unless="${testResults.isEmpty()}">
            <div class="col" th:each="result : ${testResults}">

                <!-- Determine pass/fail -->
                <div class="card shadow-sm border-0 h-100 result-card"
                     th:classappend="${result.totalMarks > 0 and result.totalScore * 100 / result.totalMarks >= 50 ? 'pass-card' : 'fail-card'}">

                    <!-- Header -->
                    <div class="card-header border-0 py-3"
                         th:classappend="${result.totalMarks > 0 and result.totalScore * 100 / result.totalMarks >= 50 ? 'bg-success text-white' : 'bg-danger text-white'}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="mb-0 fw-bold" th:text="${result.testName}">Test Name</h6>
                                <small class="opacity-75" th:text="'ID: ' + ${result.testId}">ID</small>
                            </div>
                            <span class="badge bg-white fw-bold"
                                  th:classappend="${result.totalMarks > 0 and result.totalScore * 100 / result.totalMarks >= 50 ? 'text-success' : 'text-danger'}"
                                  th:text="${result.totalMarks > 0 and result.totalScore * 100 / result.totalMarks >= 50 ? '✅ PASSED' : '❌ FAILED'}">
                            </span>
                        </div>
                    </div>

                    <div class="card-body">

                        <!-- Score Summary Cards -->
                        <div class="row text-center g-2 mb-3">
                            <!-- Score -->
                            <div class="col-4">
                                <div class="summary-mini-card bg-primary-subtle rounded-3 py-2">
                                    <div class="fw-bold fs-4 text-primary" th:text="${result.totalScore}">0</div>
                                    <div class="x-label">Score</div>
                                </div>
                            </div>
                            <!-- Correct -->
                            <div class="col-4">
                                <div class="summary-mini-card bg-success-subtle rounded-3 py-2">
                                    <div class="fw-bold fs-4 text-success" th:text="${result.totalScore}">0</div>
                                    <div class="x-label">Correct</div>
                                </div>
                            </div>
                            <!-- Wrong -->
                            <div class="col-4">
                                <div class="summary-mini-card bg-danger-subtle rounded-3 py-2">
                                    <div class="fw-bold fs-4 text-danger"
                                         th:text="${result.totalMarks - result.totalScore}">0</div>
                                    <div class="x-label">Wrong</div>
                                </div>
                            </div>
                        </div>

                        <!-- Score over Total -->
                        <div class="d-flex justify-content-between mb-1">
                            <small class="text-muted">Score</small>
                            <small class="fw-semibold"
                                   th:text="${result.totalScore} + ' / ' + ${result.totalMarks}">0/0</small>
                        </div>

                        <!-- Progress bar -->
                        <div class="progress mb-3" style="height:10px; border-radius:6px;">
                            <div class="progress-bar rounded-pill"
                                 role="progressbar"
                                 th:classappend="${result.totalMarks > 0 and result.totalScore * 100 / result.totalMarks >= 50 ? 'bg-success' : 'bg-danger'}"
                                 th:style="'width:' + (${result.totalMarks > 0 ? (result.totalScore * 100 / result.totalMarks) : 0}) + '%'">
                            </div>
                        </div>

                        <!-- Percentage chip -->
                        <div class="text-center mb-3">
                            <span class="badge rounded-pill fs-6 px-3 py-2"
                                  th:classappend="${result.totalMarks > 0 and result.totalScore * 100 / result.totalMarks >= 50 ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'}"
                                  th:text="${result.totalMarks > 0 ? T(java.lang.Math).round(result.totalScore * 100.0 / result.totalMarks) : 0} + '%'">
                            </span>
                        </div>

                        <!-- Detail rows -->
                        <div class="detail-row">
                            <i class="bi bi-person-fill text-muted me-1"></i>
                            <span th:text="${result.name}">Name</span>
                        </div>
                        <div class="detail-row">
                            <i class="bi bi-clock-fill text-muted me-1"></i>
                            <span th:text="${#temporals.format(result.submittedAt, 'dd MMM yyyy, hh:mm a')}">Time</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <style>
            .result-card { border-radius: 14px; transition: transform .2s, box-shadow .2s; }
            .result-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,.12) !important; }
            .summary-mini-card { padding: 8px 4px; }
            .x-label { font-size: .65rem; text-transform: uppercase; color: #666; letter-spacing: .5px; }
            .detail-row { font-size: .82rem; color: #555; margin-bottom: 4px; }
        </style>

    </main>
</body>
</html>
