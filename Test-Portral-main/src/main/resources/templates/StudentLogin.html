<html th:replace="~{base::layout(~{::main})}">
	<head></head>
	
	<body>
		<main>
			<style>
        body {
            background: linear-gradient(to right, #6dd5ed, #2193b0);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: #fff;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            margin-top: 200px;
        }

        .form-label {
            font-weight: 500;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }

        .toggle-password {
            cursor: pointer;
        }
    </style>
    
    <div class="row py-5 mt-5">
    	<div class="login-card mx-auto">
    <div class="text-center mb-4">
        <i class="bi bi-person-circle fs-1 text-primary"></i>
        <h4 class="mt-2">Student Login</h4>
        <div th:if="${msg}" class="alert alert-warning alert-dismissible fade show" role="alert">
  			<span th:text="${msg}"></span>
  			<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
	  	</div>
    </div>

    <form action="/StudentLogin" method="post">
        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                <input type="email" class="form-control" name="email" placeholder="Enter email" required>
            </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" class="form-control" name="password" id="passwordInput" placeholder="Enter password" required>
                <span class="input-group-text toggle-password" onclick="togglePassword()">
                    <i class="bi bi-eye-fill" id="toggleIcon"></i>
                </span>
            </div>
        </div>

        <!-- Remember Me & Forgot -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label" for="rememberMe">Remember me</label>
            </div>
            <a href="#" class="small text-decoration-none">Forgot Password?</a>
        </div>

        <!-- Submit -->
        <div class="d-grid">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </button>
        </div>

        <!-- Register -->
        <div class="text-center mt-3">
            <span class="small">Don't have an account?</span>
            <a href="/Registration" class="small fw-semibold text-decoration-none">Register here</a>
        </div>
    </form>
</div>
    	
    </div>
    
    <script>
    function togglePassword() {
        const input = document.getElementById("passwordInput");
        const icon = document.getElementById("toggleIcon");
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("bi-eye-fill");
            icon.classList.add("bi-eye-slash-fill");
        } else {
            input.type = "password";
            icon.classList.remove("bi-eye-slash-fill");
            icon.classList.add("bi-eye-fill");
        }
    }
</script>
    
		</main>
	</body>
</html>
